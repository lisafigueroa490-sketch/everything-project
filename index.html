<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>THE EVERYTHING AND PROJECTS</title>
    <style>
        body { font-family: sans-serif; background: #09090b; color: #f4f4f5; padding: 20px; margin: 0; display: flex; justify-content: center; align-items: center; min-height: 100vh; }
        .window { width: 100%; max-width: 550px; background: #18181b; border: 1px solid #27272a; border-radius: 12px; padding: 20px; }
        .header-area { display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #27272a; padding-bottom: 15px; margin-bottom: 15px; }
        h2 { margin: 0; font-size: 1.3rem; color: #ffffff; }
        #chatbox { width: 100%; height: 380px; overflow-y: auto; padding: 12px; background: #09090b; border: 1px solid #27272a; border-radius: 8px; box-sizing: border-box; margin-bottom: 15px; }
        .input-area { display: flex; gap: 10px; }
        input { flex-grow: 1; padding: 12px; background: #27272a; color: #f4f4f5; border: 1px solid #3f3f46; border-radius: 8px; outline: none; }
        button { padding: 12px 20px; background: #2563eb; color: white; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; }
        .msg-user { color: #3b82f6; margin-bottom: 12px; text-align: right; }
        .msg-bot { color: #10b981; margin-bottom: 12px; text-align: left; }
    </style>
</head>
<body>
    <div class="window">
        <div class="header-area">
            <h2>THE EVERYTHING AND PROJECTS</h2>
        </div>
        <div id="chatbox"></div>
        <div class="input-area">
            <input type="text" id="user-input" placeholder="Escribe algo aquí..." onkeypress="if(event.key === 'Enter') sendToTunnel()">
            <button onclick="sendToTunnel()">Enviar</button>
        </div>
    </div>

    <script>
        async function sendToTunnel() {
            const input = document.getElementById('user-input');
            const chatbox = document.getElementById('chatbox');
            const texto = input.value.trim();
            if (!texto) return;

            chatbox.innerHTML += `<div class="msg-user"><b>Tú:</b> ${texto}</div>`;
            input.value = '';

            try {
                // Apunta al puerto local estable que ya te funcionó
                const respuesta = await fetch('http://127.0.0.1:3000/api/chat', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ messages: [{ role: "user", content: texto }] })
                });

                const datos = await respuesta.json();
                let msg = datos.choices?.[0]?.message?.content || datos.content || JSON.stringify(datos);
                chatbox.innerHTML += `<div class="msg-bot"><b>Beth OS:</b> ${msg}</div>`;
            } catch (error) {
                chatbox.innerHTML += `<div class="msg-bot" style="color: #ef4444;"><b>Error:</b> No se pudo conectar al servidor local.</div>`;
            }
            chatbox.scrollTop = chatbox.scrollHeight;
        }
    </script>
</body>
</html>
